<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Hero Match - 16 Heroes Double Row</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #e63946; --dark: #0b132b; --light: #f1faee; --accent: #3a506b; }
        
        * { box-sizing: border-box; }

        body { 
            font-family: sans-serif; 
            background-color: var(--dark); 
            color: var(--light); 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            align-items: center; 
        }
        
        header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            width: 100%; 
            height: 35px; 
            padding: 0 15px;
            background: rgba(0,0,0,0.3);
        }
        
        h1 { font-size: 0.9rem; margin: 0; color: var(--primary); text-transform: uppercase; }
        .inst-row { font-size: 0.75rem; opacity: 0.8; }
        .btn-padlet { background: var(--primary); color: white; text-decoration: none; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }

        .game-area { 
            flex: 1; 
            width: 98vw; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; /* Centra tutto verticalmente */
            gap: 10px;
            padding: 5px 0;
        }

        /* Griglia a 8 colonne: con 16 carte andrà automaticamente su 2 righe */
        .card-row { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: 5px; 
            width: 100%;
        }

        /* Rettangoli A ancora più compatti */
        .card-id { 
            aspect-ratio: 3/1.4; 
            background: #111; 
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 4px; 
            cursor: zoom-in; 
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-id img { width: 100%; height: 100%; object-fit: cover; }
        .card-id:hover { border-color: var(--primary); transform: scale(1.05); z-index: 10; }

        /* Avatar B leggermente più piccoli per stare su due righe */
        .avatar-slot { 
            aspect-ratio: 1/1; 
            border: 1px dashed var(--accent); 
            border-radius: 6px; 
            background: rgba(255,255,255,0.03); 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .avatar-slot img { width: 85%; height: 85%; object-fit: contain; }
        .avatar-slot.matched { border: 1px solid #4caf50; background: rgba(76, 175, 80, 0.1); }
        .avatar-slot.matched img { opacity: 0.1; }
        .avatar-slot.matched::after { content: "✅"; position: absolute; font-size: 1.2rem; }

        .label-section { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: var(--accent); 
            text-align: center;
            margin-bottom: 2px;
        }

        /* Zoom & Win Modals */
        #zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        #zoom-modal img { max-width: 90%; max-height: 90%; border: 2px solid white; }

        #win-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #000; padding: 20px; border-radius: 15px; text-align: center; z-index: 3000; border: 4px solid var(--primary); width: 250px; }
        #code-num { display: none; font-size: 50px; color: var(--primary); font-weight: bold; }
        
        .hidden { visibility: hidden; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <h1>HERO MATCHING</h1>
    <div class="inst-row">Trascina Badge (A) su Avatar (B) | Zoom con Click</div>
    <a href="https://padlet.com/professoressalauraa/superheroes-academy-5iu1b24rpu9h1bco" target="_blank" class="btn-padlet">PADLET</a>
</header>

<div class="game-area">
    <div>
        <div class="label-section">Badge Identificativi (A)</div>
        <div class="card-row" id="id-row"></div>
    </div>

    <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px;">
        <div class="label-section">Obiettivi Avatar (B)</div>
        <div class="card-row" id="avatar-row"></div>
    </div>
</div>

<div id="zoom-modal" onclick="this.style.display='none'"><img id="zoom-img"></div>

<div id="win-modal">
    <h3 style="margin:0">OTTIMO LAVORO!</h3>
    <p style="font-size:0.9rem">Tutti gli eroi sono stati identificati.</p>
    <button style="background:var(--primary);color:white;border:none;padding:10px;width:100%;cursor:pointer;font-weight:bold;border-radius:4px;" id="reveal-btn" onclick="showCode()">RIVELA CODICE</button>
    <div id="code-num">0</div>
</div>

<script>
    const total = 16;
    let matches = 0;
    const nums = Array.from({length: total}, (_, i) => i + 1);
    const shuffled = [...nums].sort(() => Math.random() - 0.5);

    const idRow = document.getElementById('id-row');
    const avatarRow = document.getElementById('avatar-row');

    // Creazione ID Cards A (8 per riga x 2 righe = 16)
    shuffled.forEach(n => {
        const d = document.createElement('div');
        d.className = 'card-id'; d.draggable = true; d.id = `c${n}`; d.dataset.m = n;
        d.onclick = () => { 
            document.getElementById('zoom-img').src = `${n}A.png`; 
            document.getElementById('zoom-modal').style.display = 'flex'; 
        };
        d.innerHTML = `<img src="${n}A.png">`;
        d.ondragstart = (e) => e.dataTransfer.setData('t', d.id);
        idRow.appendChild(d);
    });

    // Creazione Slot Avatar B (8 per riga x 2 righe = 16)
    nums.forEach(n => {
        const s = document.createElement('div');
        s.className = 'avatar-slot'; s.dataset.i = n;
        s.innerHTML = `<img src="${n}B.png">`;
        s.ondragover = (e) => e.preventDefault();
        s.ondrop = (e) => {
            const dragId = e.dataTransfer.getData('t');
            const dragElem = document.getElementById(dragId);
            if (dragElem && dragElem.dataset.m == s.dataset.i) {
                s.classList.add('matched');
                dragElem.classList.add('hidden');
                matches++;
                if (matches === total) {
                    lanciaConfetti();
                    setTimeout(() => { document.getElementById('win-modal').style.display = 'block'; }, 800);
                }
            }
        };
        avatarRow.appendChild(s);
    });

    function lanciaConfetti() {
        const end = Date.now() + 3000;
        (function f() {
            confetti({particleCount:4, angle:60, spread:55, origin:{x:0}});
            confetti({particleCount:4, angle:120, spread:55, origin:{x:1}});
            if(Date.now() < end) requestAnimationFrame(f);
        }());
    }

    function showCode() {
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('code-num').style.display = 'block';
    }
</script>

</body>
</html>
