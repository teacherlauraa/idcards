<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Hero Match - Ultra Compact</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #e63946;
            --dark: #0b132b;
            --light: #f1faee;
            --accent: #3a506b;
        }

        body {
            font-family: sans-serif;
            background-color: var(--dark);
            color: var(--light);
            margin: 0;
            padding: 2px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 5px; }
        h1 { font-size: 0.9rem; margin: 0; color: var(--primary); text-transform: uppercase; }
        p { font-size: 0.65rem; margin: 0; opacity: 0.7; }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 98vw;
            gap: 15px;
        }

        .row-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--accent);
            margin-left: 5px;
            font-weight: bold;
        }

        .card-row {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 4px;
        }

        /* CARTE ID (A) */
        .card-id {
            aspect-ratio: 2/3;
            background: #000;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            cursor: zoom-in;
            transition: 0.2s;
        }
        .card-id img { width: 100%; height: 100%; object-fit: contain; }
        .card-id:hover { border-color: var(--primary); transform: scale(1.05); z-index: 10; }

        /* SLOT AVATAR (B) */
        .avatar-slot {
            aspect-ratio: 2/3;
            border: 1px dashed var(--accent);
            border-radius: 4px;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .avatar-slot img { width: 85%; height: auto; max-height: 85%; object-fit: contain; }
        .avatar-slot.drag-over { background: rgba(230, 57, 70, 0.2); }
        .avatar-slot.matched { border: 1px solid #4caf50; background: rgba(76, 175, 80, 0.1); }
        .avatar-slot.matched img { opacity: 0.1; }
        .avatar-slot.matched::after { content: "✅"; position: absolute; font-size: 1.2rem; }

        /* ZOOM & VITTORIA */
        #zoom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
        }
        #zoom-modal img { max-width: 90%; max-height: 90%; border: 2px solid white; }

        #win-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: var(--dark); padding: 15px; border-radius: 10px;
            text-align: center; z-index: 3000; width: 250px;
        }
        #code-num { display: none; font-size: 60px; color: var(--primary); font-weight: bold; margin: 10px 0; }
        
        button { background: var(--primary); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .hidden { visibility: hidden; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <h1>HERO MATCHING CENTER</h1>
    <p>Trascina le ID Card sugli Avatar. Click per ingrandire.</p>
</header>

<div class="game-area">
    <div class="row-container">
        <div class="label">Carte d'Identità (A)</div>
        <div class="card-row" id="id-row"></div>
    </div>

    <div class="row-container">
        <div class="label">Database Avatar (B)</div>
        <div class="card-row" id="avatar-row"></div>
    </div>
</div>

<div id="zoom-modal" onclick="this.style.display='none'"><img id="zoom-img"></div>

<div id="win-modal">
    <h3>Missione Compiuta!</h3>
    <button id="reveal-btn" onclick="showCode()">RIVELA CODICE</button>
    <div id="code-num">0</div>
</div>

<script>
    const total = 9;
    let matches = 0;

    const idRow = document.getElementById('id-row');
    const avatarRow = document.getElementById('avatar-row');

    const nums = Array.from({length: total}, (_, i) => i + 1);
    const shuffled = [...nums].sort(() => Math.random() - 0.5);

    // Crea ID Cards (A)
    shuffled.forEach(n => {
        const d = document.createElement('div');
        d.className = 'card-id';
        d.draggable = true;
        d.id = `c${n}`;
        d.dataset.m = n;
        d.onclick = () => { document.getElementById('zoom-img').src = `${n}A.png`; document.getElementById('zoom-modal').style.display = 'flex'; };
        d.innerHTML = `<img src="${n}A.png">`;
        d.ondragstart = (e) => e.dataTransfer.setData('t', d.id);
        idRow.appendChild(d);
    });

    // Crea Slot Avatar (B)
    nums.forEach(n => {
        const s = document.createElement('div');
        s.className = 'avatar-slot';
        s.dataset.i = n;
        s.innerHTML = `<img src="${n}B.png">`;
        s.ondragover = (e) => e.preventDefault();
        s.ondragenter = () => s.classList.add('drag-over');
        s.ondragleave = () => s.classList.remove('drag-over');
        s.ondrop = (e) => {
            s.classList.remove('drag-over');
            const dragId = e.dataTransfer.getData('t');
            const dragElem = document.getElementById(dragId);
            if (dragElem.dataset.m == s.dataset.i) {
                s.classList.add('matched');
                dragElem.classList.add('hidden');
                matches++;
                if (matches === total) {
                    const end = Date.now() + 5000;
                    (function f() {
                        confetti({particleCount:5, angle:60, spread:55, origin:{x:0}});
                        confetti({particleCount:5, angle:120, spread:55, origin:{x:1}});
                        if(Date.now() < end) requestAnimationFrame(f);
                    }());
                    setTimeout(() => { document.getElementById('win-modal').style.display = 'block'; }, 1000);
                }
            }
        };
        avatarRow.appendChild(s);
    });

    function showCode() {
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('code-num').style.display = 'block';
    }
</script>

</body>
</html>
